http:
  routers:
    dev-webot:
      rule: Host(`dev-webot.{{ env "DOMAIN_MAIN_PRIMARY" }}`)
      service: dev-webot
      middlewares:
        - tinyauth

    dev-frontend:
      rule: Host(`dev-frontend.{{ env "DOMAIN_MAIN_PRIMARY" }}`)
      service: dev-frontend
      middlewares:
        - tinyauth

    dev-backend:
      rule: Host(`dev-backend.{{ env "DOMAIN_MAIN_PRIMARY" }}`)
      service: dev-backend
      middlewares:
        - tinyauth

    dev-webot-local:
      rule: Host(`dev-webot.{{ env "DOMAIN_MAIN_SECONDARY" }}`)
      service: dev-webot

    dev-frontend-local:
      rule: Host(`dev-frontend.{{ env "DOMAIN_MAIN_SECONDARY" }}`)
      service: dev-frontend

    dev-backend-local:
      rule: Host(`dev-backend.{{ env "DOMAIN_MAIN_SECONDARY" }}`)
      service: dev-backend

    dev-frontend-homelab:
      rule: Host(`dev-frontend-homelab.{{ env "DOMAIN_MAIN_PRIMARY" }}`)
      service: dev-frontend-homelab

    dev-backend-homelab:
      rule: Host(`dev-backend-homelab.{{ env "DOMAIN_MAIN_PRIMARY" }}`)
      service: dev-backend-homelab

    dev-frontend-homelab-local:
      rule: Host(`dev-frontend-homelab.{{ env "DOMAIN_MAIN_SECONDARY" }}`)
      service: dev-frontend-homelab

    dev-backend-homelab-local:
      rule: Host(`dev-backend-homelab.{{ env "DOMAIN_MAIN_SECONDARY" }}`)
      service: dev-backend-homelab

  services:
    dev-webot:
      loadBalancer:
        servers:
          - url: http://192.168.1.2:8000

    dev-frontend:
      loadBalancer:
        servers:
          - url: http://192.168.1.2:3000

    dev-backend:
      loadBalancer:
        servers:
          - url: http://192.168.1.2:4000

    dev-frontend-homelab:
      loadBalancer:
        servers:
          - url: http://192.168.1.100:3000

    dev-backend-homelab:
      loadBalancer:
        servers:
          - url: http://192.168.1.100:4000
